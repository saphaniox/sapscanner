name: sapscanner
description: Native mobile document scanner, converter, OCR, and compression app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  camera: ^0.12.0+1
  google_mlkit_document_scanner: ^0.5.0
  google_mlkit_text_recognition: ^0.16.0
  file_picker: ^11.0.2
  image: ^4.9.1
  pdf: ^3.13.0
  printing: ^5.15.0
  archive: ^4.0.9
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
